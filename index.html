<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>食料品チェッカー</title>
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="食料品チェッカー">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    #form-content {
      transition: max-height 0.35s ease, opacity 0.3s ease;
      overflow: hidden;
    }
    #form-chevron {
      transition: transform 0.3s ease;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background-color 0.15s;
    }

    @keyframes pulse-warn {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .expiry-pulse { animation: pulse-warn 2s ease-in-out infinite; }

    .item-row { transition: background-color 0.15s; }
    .item-row:hover { background-color: rgba(255, 251, 235, 0.8); }

    .delete-btn { opacity: 0; transition: opacity 0.2s; }
    .item-row:hover .delete-btn { opacity: 1; }

    /* 各セルの小さな鉛筆ボタン */
    .cell-edit-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.15s, background-color 0.15s;
      flex-shrink: 0;
    }
    .item-row:hover .cell-edit-btn { opacity: 0.4; }
    .cell-edit-btn:hover { opacity: 1 !important; background: rgba(245,158,11,0.12); }

    /* 賞味期限プログレスバー */
    .progress-track {
      background: #e2e8f0;
      border-radius: 9999px;
      height: 5px;
      overflow: hidden;
      margin-top: 5px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 9999px;
      transition: width 0.5s ease, background-color 0.5s ease;
    }

    #mode-thumb  { transition: transform 0.2s ease; }
    #mode-toggle { transition: background-color 0.2s ease; }

    /* iOSの自動ズームを防ぐ */
    input, select, textarea { font-size: 16px !important; }

    @media (max-width: 640px) {
      .delete-btn    { opacity: 1; }
      .cell-edit-btn { opacity: 0.3; }
    }
  </style>
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg,#fffbeb 0%,#fff7ed 50%,#fef3c7 100%)">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="bg-white/80 backdrop-blur-sm border-b border-amber-100 sticky top-0 z-30 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
      <span class="text-2xl">🛒</span>
      <div>
        <h1 class="text-lg font-bold text-amber-700 leading-tight">食料品チェッカー</h1>
        <p class="text-xs text-amber-400">新鮮な食材を管理しましょう</p>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <span class="text-xs text-gray-400">ローカル</span>
        <button id="mode-toggle" onclick="toggleStorageMode()" title="保存先を切り替え"
          class="relative w-10 h-5 rounded-full focus:outline-none"
          style="background:#d1d5db">
          <span id="mode-thumb"
            class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow"
            style="transform:translateX(0)"></span>
        </button>
        <span class="text-xs text-gray-400">Firebase</span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-5 space-y-5">

    <!-- ── 上段：登録フォーム（折りたたみ） ──────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-amber-100/60">

      <button id="form-toggle"
        class="w-full flex items-center justify-between px-5 py-4 text-left hover:bg-amber-50/50 transition-colors rounded-2xl"
        onclick="toggleForm()">
        <div class="flex items-center gap-2 text-amber-700 font-semibold">
          <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
          買うものを登録
        </div>
        <svg id="form-chevron" class="w-5 h-5 text-amber-400"
          style="transform:rotate(180deg)"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <div id="form-content" style="max-height:600px;opacity:1;">
        <div class="px-5 pb-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">

            <!-- 品名 -->
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1.5">品名</label>
              <input id="input-name" type="text" placeholder="例：牛乳"
                class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent placeholder-gray-300"
                onkeydown="if(event.key==='Enter') addToBuyItem()"/>
            </div>

            <!-- カテゴリ -->
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1.5">カテゴリ</label>
              <div class="flex gap-2">
                <select id="input-category"
                  class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
                </select>
                <button onclick="openCategoryManageModal()"
                  title="カテゴリを管理"
                  class="px-2.5 py-2 bg-amber-50 hover:bg-amber-100 text-amber-600 rounded-xl border border-amber-200 transition-colors flex items-center justify-center">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <button onclick="addToBuyItem()"
            class="w-full sm:w-auto px-8 py-2.5 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white rounded-xl font-semibold text-sm shadow-sm transition-colors">
            追加する
          </button>
        </div>
      </div>
    </section>

    <!-- ── 中段：買うものリスト ────────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-amber-100/60">

      <div class="px-5 py-4 border-b border-gray-100 flex items-center gap-3">
        <span class="text-xl">🛍️</span>
        <h2 class="font-semibold text-gray-700">
          買うものリスト
        </h2>
        <span id="tobuy-count" class="text-sm font-normal text-gray-400"></span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">品名</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">カテゴリ</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">操作</th>
            </tr>
          </thead>
          <tbody id="tobuy-list"></tbody>
        </table>

        <div id="tobuy-empty" class="py-14 text-center">
          <div class="text-5xl mb-3">✅</div>
          <p class="text-gray-400 font-medium">買うものはありません</p>
          <p class="text-gray-300 text-xs mt-1">上のフォームから追加してください</p>
        </div>
      </div>
    </section>

    <!-- ── 下段：買ったものリスト ─────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-orange-100/60">

      <div class="px-5 py-4 border-b border-gray-100 flex items-center gap-3">
        <span class="text-xl">🥦</span>
        <h2 class="font-semibold text-gray-700">
          買ったものリスト
        </h2>
        <span id="purchased-count" class="text-sm font-normal text-gray-400"></span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">品名</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">カテゴリ</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">購入日</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">賞味期限</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">操作</th>
            </tr>
          </thead>
          <tbody id="purchased-list"></tbody>
        </table>

        <div id="purchased-empty" class="py-14 text-center">
          <div class="text-5xl mb-3">🛒</div>
          <p class="text-gray-400 font-medium">まだ購入済みのものはありません</p>
          <p class="text-gray-300 text-xs mt-1">買うものリストから「購入済へ」を押してください</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ── カテゴリ管理モーダル ─────────────────────────────── -->
  <div id="category-manage-modal"
    class="fixed inset-0 flex items-center justify-center z-50 hidden"
    style="background:rgba(0,0,0,0.25);backdrop-filter:blur(4px)"
    onclick="if(event.target===this) closeCategoryManageModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-96 mx-4 flex flex-col" style="max-height:85vh">

      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-semibold text-gray-700">カテゴリ管理</h3>
        <button onclick="closeCategoryManageModal()"
          class="icon-btn text-gray-400 hover:text-gray-600 hover:bg-gray-100">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <ul id="category-list" class="overflow-y-auto flex-1 px-4 py-3 space-y-1"></ul>

      <div class="px-4 py-4 border-t border-gray-100">
        <p class="text-xs font-medium text-gray-400 mb-2">新しいカテゴリを追加</p>
        <div class="flex gap-2">
          <input id="new-category-input" type="text" placeholder="例：冷凍食品"
            class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
            onkeydown="if(event.key==='Enter') addCategory()"/>
          <button onclick="addCategory()"
            class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-sm font-semibold transition-colors whitespace-nowrap">
            追加
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── JavaScript ─────────────────────────────────────── -->
  <script type="module">
    import { initializeApp }                                  from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js';
    import { getFirestore, doc, setDoc, getDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js';

    const firebaseConfig = {
      apiKey:            'AIzaSyBqE2x92dQfiBchfx8bHhttcA5dlEjBqIw',
      authDomain:        'grocery-checker-14fd9.firebaseapp.com',
      projectId:         'grocery-checker-14fd9',
      storageBucket:     'grocery-checker-14fd9.firebasestorage.app',
      messagingSenderId: '196806466819',
      appId:             '1:196806466819:web:206d119f07cfdbed8a1d36',
    };
    const fbApp = initializeApp(firebaseConfig);
    const db    = getFirestore(fbApp);
    const DOC   = doc(db, 'grocery-checker', 'data');

    // ─── State ───────────────────────────────────────────────
    let toBuyItems     = [];
    let purchasedItems = [];
    let categories     = ['野菜', '肉・魚', '乳製品', '飲み物', '調味料', 'その他'];
    let formCollapsed  = false;

    const TOBUY_KEY     = 'grocery-checker-tobuy';
    const PURCHASED_KEY = 'grocery-checker-purchased';
    const CATS_KEY      = 'grocery-checker-categories';
    const MODE_KEY      = 'grocery-checker-mode';
    let storageMode     = localStorage.getItem(MODE_KEY) || 'local';

    // ─── Persistence ─────────────────────────────────────────
    function loadLocal() {
      try {
        const st = localStorage.getItem(TOBUY_KEY);
        const sp = localStorage.getItem(PURCHASED_KEY);
        const sc = localStorage.getItem(CATS_KEY);
        if (st) toBuyItems     = JSON.parse(st);
        if (sp) purchasedItems = JSON.parse(sp);
        if (sc) categories     = JSON.parse(sc);
      } catch(e) {}
    }

    function saveLocal() {
      localStorage.setItem(TOBUY_KEY,     JSON.stringify(toBuyItems));
      localStorage.setItem(PURCHASED_KEY, JSON.stringify(purchasedItems));
      localStorage.setItem(CATS_KEY,      JSON.stringify(categories));
    }

    async function saveData() {
      saveLocal();
      if (storageMode === 'firebase') {
        await setDoc(DOC, { toBuy: toBuyItems, purchased: purchasedItems, categories });
      }
    }

    // ─── Helpers ─────────────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatDate(str) {
      if (!str) return '—';
      const [y, m, d] = str.split('-');
      return `${y}/${m}/${d}`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;');
    }

    // ─── Storage mode UI ─────────────────────────────────────
    function updateModeUI() {
      const toggle = document.getElementById('mode-toggle');
      const thumb  = document.getElementById('mode-thumb');
      if (storageMode === 'firebase') {
        toggle.style.background = '#d97706';
        thumb.style.transform   = 'translateX(20px)';
      } else {
        toggle.style.background = '#d1d5db';
        thumb.style.transform   = 'translateX(0)';
      }
    }

    // ─── Firebase listener ────────────────────────────────────
    let fbUnsub = null;

    function enableFirebaseListener() {
      if (fbUnsub) return;
      fbUnsub = onSnapshot(DOC, snapshot => {
        if (storageMode !== 'firebase') return;
        const data = snapshot.data();
        if (data) {
          toBuyItems     = data.toBuy      || [];
          purchasedItems = data.purchased  || [];
          categories     = data.categories || ['野菜', '肉・魚', '乳製品', '飲み物', '調味料', 'その他'];
          saveLocal();
          renderCategorySelect();
          renderToBuyList();
          renderPurchasedList();
          const modal = document.getElementById('category-manage-modal');
          if (!modal.classList.contains('hidden') && editingCatIndex === -1) {
            renderCategoryList();
          }
        } else {
          setDoc(DOC, { toBuy: toBuyItems, purchased: purchasedItems, categories });
        }
      });
    }

    function disableFirebaseListener() {
      if (fbUnsub) { fbUnsub(); fbUnsub = null; }
    }

    async function toggleStorageMode() {
      if (storageMode === 'firebase') {
        const ok = confirm(
          'ローカル保存に切り替えます。\n' +
          'Firebaseとの同期を停止し、このデバイスにのみ保存されます。\n' +
          '続けますか？'
        );
        if (!ok) return;
        disableFirebaseListener();
        storageMode = 'local';
        localStorage.setItem(MODE_KEY, 'local');
        updateModeUI();
      } else {
        const snapshot = await getDoc(DOC);
        const hasData  = snapshot.exists();
        const ok = confirm(
          hasData
            ? 'Firebaseにデータが存在します。\nFirebaseのデータを優先して同期します（ローカルは上書きされます）。\n続けますか？'
            : 'Firebaseにデータがありません。\n現在のローカルデータをFirebaseにアップロードして同期します。\n続けますか？'
        );
        if (!ok) return;
        storageMode = 'firebase';
        localStorage.setItem(MODE_KEY, 'firebase');
        if (!hasData) await setDoc(DOC, { toBuy: toBuyItems, purchased: purchasedItems, categories });
        enableFirebaseListener();
        updateModeUI();
      }
    }

    // ─── Form ────────────────────────────────────────────────
    function toggleForm() {
      formCollapsed = !formCollapsed;
      const content = document.getElementById('form-content');
      const chevron = document.getElementById('form-chevron');
      if (formCollapsed) {
        content.style.maxHeight = '0';
        content.style.opacity   = '0';
        chevron.style.transform = 'rotate(0deg)';
      } else {
        content.style.maxHeight = '600px';
        content.style.opacity   = '1';
        chevron.style.transform = 'rotate(180deg)';
      }
    }

    function addToBuyItem() {
      const name     = document.getElementById('input-name').value.trim();
      const category = document.getElementById('input-category').value;

      if (!name) {
        const inp = document.getElementById('input-name');
        inp.classList.add('ring-2', 'ring-red-400');
        inp.focus();
        setTimeout(() => inp.classList.remove('ring-2', 'ring-red-400'), 1500);
        return;
      }

      toBuyItems.push({ id: Date.now().toString(), name, category });
      saveData();
      renderToBuyList();
      document.getElementById('input-name').value = '';
      document.getElementById('input-name').focus();
    }

    // ─── To-Buy actions ──────────────────────────────────────
    function markPurchased(id) {
      const item = toBuyItems.find(i => i.id === id);
      if (!item) return;
      toBuyItems = toBuyItems.filter(i => i.id !== id);
      purchasedItems.unshift({
        id:            Date.now().toString(),
        name:          item.name,
        category:      item.category,
        purchasedDate: todayStr(),
        expiryDate:    null,
      });
      saveData();
      renderToBuyList();
      renderPurchasedList();
    }

    function deleteToBuyItem(id) {
      if (!confirm('このアイテムを削除しますか？')) return;
      toBuyItems = toBuyItems.filter(i => i.id !== id);
      saveData();
      renderToBuyList();
    }

    // ─── Render: category select ─────────────────────────────
    function renderCategorySelect() {
      const sel  = document.getElementById('input-category');
      const prev = sel.value;
      sel.innerHTML = categories
        .map(c => `<option value="${esc(c)}">${esc(c)}</option>`)
        .join('');
      if (categories.includes(prev)) sel.value = prev;
    }

    // ─── Render: to-buy list ─────────────────────────────────
    function renderToBuyList() {
      const tbody = document.getElementById('tobuy-list');
      const empty = document.getElementById('tobuy-empty');
      document.getElementById('tobuy-count').textContent =
        toBuyItems.length ? `(${toBuyItems.length}件)` : '';

      if (toBuyItems.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      tbody.innerHTML = toBuyItems.map(item => `
<tr class="item-row border-b border-gray-50">
  <td class="px-5 py-3.5 font-medium text-gray-700 whitespace-nowrap">${esc(item.name)}</td>
  <td class="px-5 py-3.5 whitespace-nowrap">
    <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-100">
      ${esc(item.category)}
    </span>
  </td>
  <td class="px-5 py-3.5 whitespace-nowrap">
    <div class="flex items-center gap-1">
      <button
        class="flex items-center gap-1.5 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 rounded-lg text-xs font-medium border border-green-200 transition-colors"
        onclick="markPurchased('${esc(item.id)}')" title="購入済みにする">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
        購入済へ
      </button>
      <button class="icon-btn delete-btn text-gray-300 hover:text-red-400 hover:bg-red-50"
        onclick="deleteToBuyItem('${esc(item.id)}')" title="削除">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </td>
</tr>`).join('');
    }

    // ─── Expiry helpers ──────────────────────────────────────
    function expiryStatus(expiryStr) {
      if (!expiryStr) return 'none';
      const now    = new Date(); now.setHours(0, 0, 0, 0);
      const expiry = new Date(expiryStr + 'T00:00:00');
      const diff   = Math.ceil((expiry - now) / 86400000);
      if (diff < 0)  return 'expired';
      if (diff <= 3) return 'soon';
      return 'ok';
    }

    function expiryDiff(expiryStr) {
      const now    = new Date(); now.setHours(0, 0, 0, 0);
      const expiry = new Date(expiryStr + 'T00:00:00');
      return Math.ceil((expiry - now) / 86400000);
    }

    // ─── Progress bar helpers ─────────────────────────────────
    function expiryProgress(purchasedDate, expiryDate) {
      if (!expiryDate || !purchasedDate) return null;
      const start = new Date(purchasedDate + 'T00:00:00');
      const end   = new Date(expiryDate   + 'T00:00:00');
      const now   = new Date(); now.setHours(0, 0, 0, 0);
      const total = end - start;
      if (total <= 0) return 1;
      return (now - start) / total;
    }

    function progressColor(ratio) {
      if (ratio < 0.50) return '#22c55e';
      if (ratio < 0.75) return '#84cc16';
      if (ratio < 1.00) return '#f97316';
      return '#ef4444';
    }

    // ─── Render helpers ───────────────────────────────────────
    function pb(id, field) {
      const titles = { name: '品名を編集', category: 'カテゴリを編集', purchasedDate: '購入日を編集', expiryDate: '賞味期限を編集' };
      return `<button class="cell-edit-btn" onclick="startEditField('${esc(id)}','${field}')" title="${titles[field]}">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
        </svg>
      </button>`;
    }

    function scBtns(id) {
      return `<button onclick="saveEditField('${esc(id)}')" class="icon-btn text-amber-500 hover:bg-amber-100" title="保存">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/></svg>
      </button>
      <button onclick="cancelEditField()" class="icon-btn text-gray-300 hover:bg-gray-100" title="キャンセル">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
      </button>`;
    }

    function ymdSelects(y, m, d) {
      const now = new Date();
      const ty  = now.getFullYear();
      const cls = 'border border-amber-300 rounded-lg px-1.5 py-1 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white';
      const yOpts = Array.from({ length: 6 }, (_, i) => ty + i)
        .map(yr => `<option value="${yr}"${yr === y ? ' selected' : ''}>${yr}年</option>`).join('');
      const mOpts = Array.from({ length: 12 }, (_, i) => i + 1)
        .map(mo => `<option value="${mo}"${mo === m ? ' selected' : ''}>${mo}月</option>`).join('');
      const dOpts = Array.from({ length: 31 }, (_, i) => i + 1)
        .map(da => `<option value="${da}"${da === d ? ' selected' : ''}>${da}日</option>`).join('');
      return `<select id="edit-field-year"  class="${cls}">${yOpts}</select>
              <select id="edit-field-month" class="${cls}">${mOpts}</select>
              <select id="edit-field-day"   class="${cls}">${dOpts}</select>`;
    }

    // ─── Field edit state ─────────────────────────────────────
    let editingField = null; // { id, field: 'name'|'category'|'purchasedDate'|'expiryDate' }

    function startEditField(id, field) {
      editingField = { id, field };
      renderPurchasedList();
      setTimeout(() => {
        const el = document.getElementById('edit-field-input')
                || document.getElementById('edit-field-select')
                || document.getElementById('edit-field-year');
        if (el) { el.focus(); if (el.select) el.select(); }
      }, 30);
    }

    function cancelEditField() {
      editingField = null;
      renderPurchasedList();
    }

    function saveEditField(id) {
      const item = purchasedItems.find(i => i.id === id);
      if (!item || !editingField) return;
      const { field } = editingField;

      if (field === 'name') {
        const el  = document.getElementById('edit-field-input');
        const val = el ? el.value.trim() : '';
        if (!val) {
          if (el) { el.classList.add('ring-2','ring-red-400'); el.focus(); setTimeout(() => el.classList.remove('ring-2','ring-red-400'), 1500); }
          return;
        }
        item.name = val;
      } else if (field === 'category') {
        const el = document.getElementById('edit-field-select');
        if (el) item.category = el.value;
      } else if (field === 'purchasedDate') {
        const y = document.getElementById('edit-field-year').value;
        const m = document.getElementById('edit-field-month').value;
        const d = document.getElementById('edit-field-day').value;
        item.purchasedDate = `${y}-${pad(m)}-${pad(d)}`;
      } else if (field === 'expiryDate') {
        const hasExp = document.getElementById('edit-field-has-expiry').checked;
        if (hasExp) {
          const y = document.getElementById('edit-field-year').value;
          const m = document.getElementById('edit-field-month').value;
          const d = document.getElementById('edit-field-day').value;
          item.expiryDate = `${y}-${pad(m)}-${pad(d)}`;
        } else {
          item.expiryDate = null;
        }
      }

      saveData();
      editingField = null;
      renderPurchasedList();
    }

    function toggleExpirySelectsInCell() {
      const cb  = document.getElementById('edit-field-has-expiry');
      const sel = document.getElementById('edit-field-expiry-selects');
      if (cb && sel) sel.style.display = cb.checked ? 'flex' : 'none';
    }

    // ─── Render: purchased list ──────────────────────────────
    function renderPurchasedList() {
      const tbody = document.getElementById('purchased-list');
      const empty = document.getElementById('purchased-empty');
      document.getElementById('purchased-count').textContent =
        purchasedItems.length ? `(${purchasedItems.length}件)` : '';

      if (purchasedItems.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const now = new Date(); now.setHours(0, 0, 0, 0);
      const ef  = editingField;
      const isF = (id, f) => ef && ef.id === id && ef.field === f;

      tbody.innerHTML = purchasedItems.map(item => {
        const status = expiryStatus(item.expiryDate);
        const rowBg  = status === 'expired' ? 'bg-red-50/40'
                     : status === 'soon'    ? 'bg-orange-50/40' : '';

        // ── 品名セル ─────────────────────────────────────────
        const nameCell = isF(item.id, 'name') ? `
<td class="px-3 py-2">
  <div class="flex items-center gap-1">
    <input id="edit-field-input" type="text" value="${esc(item.name)}"
      class="flex-1 min-w-20 border border-amber-300 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
      onkeydown="if(event.key==='Enter') saveEditField('${esc(item.id)}'); else if(event.key==='Escape') cancelEditField()"/>
    ${scBtns(item.id)}
  </div>
</td>` : `
<td class="px-5 py-3.5">
  <div class="flex items-center gap-1.5">
    <span class="font-medium text-gray-700 whitespace-nowrap">${esc(item.name)}</span>
    ${pb(item.id, 'name')}
  </div>
</td>`;

        // ── カテゴリセル ──────────────────────────────────────
        const catCell = isF(item.id, 'category') ? `
<td class="px-3 py-2">
  <div class="flex items-center gap-1">
    <select id="edit-field-select"
      class="border border-amber-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
      ${categories.map(c => `<option value="${esc(c)}"${c === item.category ? ' selected' : ''}>${esc(c)}</option>`).join('')}
    </select>
    ${scBtns(item.id)}
  </div>
</td>` : `
<td class="px-5 py-3.5 whitespace-nowrap">
  <div class="flex items-center gap-1.5">
    <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-orange-50 text-orange-700 border border-orange-100">
      ${esc(item.category)}
    </span>
    ${pb(item.id, 'category')}
  </div>
</td>`;

        // ── 購入日セル ────────────────────────────────────────
        let py = now.getFullYear(), pm = now.getMonth() + 1, pd = now.getDate();
        if (item.purchasedDate) {
          const p = item.purchasedDate.split('-');
          py = +p[0]; pm = +p[1]; pd = +p[2];
        }
        const dateCell = isF(item.id, 'purchasedDate') ? `
<td class="px-3 py-2">
  <div class="flex items-center gap-1 flex-wrap">
    ${ymdSelects(py, pm, pd)}
    ${scBtns(item.id)}
  </div>
</td>` : `
<td class="px-5 py-3.5">
  <div class="flex items-center gap-1.5">
    <span class="text-gray-500 whitespace-nowrap">${formatDate(item.purchasedDate)}</span>
    ${pb(item.id, 'purchasedDate')}
  </div>
</td>`;

        // ── 賞味期限セル（プログレスバー付き） ───────────────
        let ey = now.getFullYear(), em = now.getMonth() + 1, ed = now.getDate();
        const hasExpiry = !!item.expiryDate;
        if (item.expiryDate) {
          const p = item.expiryDate.split('-');
          ey = +p[0]; em = +p[1]; ed = +p[2];
        }

        let expiryCell;
        if (isF(item.id, 'expiryDate')) {
          expiryCell = `
<td class="px-3 py-2">
  <div class="flex items-center gap-2 flex-wrap">
    <label class="flex items-center gap-1.5 text-xs text-gray-500 cursor-pointer select-none">
      <input type="checkbox" id="edit-field-has-expiry" ${hasExpiry ? 'checked' : ''}
        onchange="toggleExpirySelectsInCell()" class="rounded border-gray-300"/>
      設定する
    </label>
    <div id="edit-field-expiry-selects"
      style="display:${hasExpiry ? 'flex' : 'none'};gap:4px;align-items:center;flex-wrap:wrap">
      ${ymdSelects(ey, em, ed)}
    </div>
    ${scBtns(item.id)}
  </div>
</td>`;
        } else {
          const ratio = expiryProgress(item.purchasedDate, item.expiryDate);
          let dateLabel = '—', daysLabel = '', daysClass = '';
          let barHtml = '';

          if (item.expiryDate) {
            const diff = expiryDiff(item.expiryDate);
            dateLabel = formatDate(item.expiryDate);
            if (status === 'expired') {
              daysLabel = `${Math.abs(diff)}日超過`;
              daysClass = 'text-red-500 font-semibold expiry-pulse';
            } else if (status === 'soon') {
              daysLabel = diff === 0 ? '今日まで' : `あと${diff}日`;
              daysClass = 'text-orange-500 font-semibold';
            } else {
              daysLabel = `あと${diff}日`;
              daysClass = 'text-green-600 text-xs';
            }
            if (ratio !== null) {
              const pct   = Math.min(ratio * 100, 100).toFixed(1);
              const color = progressColor(ratio);
              const pulse = status === 'expired' ? 'expiry-pulse' : '';
              barHtml = `<div class="progress-track">
  <div class="progress-fill ${pulse}" style="width:${pct}%;background:${color}"></div>
</div>`;
            }
          }

          expiryCell = `
<td class="px-5 py-3" style="min-width:170px">
  <div class="flex items-center justify-between gap-1">
    <span class="text-gray-500 text-sm whitespace-nowrap">${dateLabel}</span>
    <div class="flex items-center gap-1">
      ${daysLabel ? `<span class="${daysClass} text-xs whitespace-nowrap">${daysLabel}</span>` : ''}
      ${pb(item.id, 'expiryDate')}
    </div>
  </div>
  ${barHtml}
</td>`;
        }

        return `
<tr class="item-row border-b border-gray-50 ${rowBg}">
  ${nameCell}
  ${catCell}
  ${dateCell}
  ${expiryCell}
  <td class="px-5 py-3.5 whitespace-nowrap">
    <button class="icon-btn delete-btn text-gray-300 hover:text-red-400 hover:bg-red-50"
      onclick="deletePurchasedItem('${esc(item.id)}')" title="削除">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
      </svg>
    </button>
  </td>
</tr>`;
      }).join('');
    }

    function deletePurchasedItem(id) {
      if (!confirm('このアイテムを削除しますか？')) return;
      purchasedItems = purchasedItems.filter(i => i.id !== id);
      saveData();
      renderPurchasedList();
    }

    // ─── Category modal ───────────────────────────────────────
    let editingCatIndex = -1;

    function openCategoryManageModal() {
      editingCatIndex = -1;
      document.getElementById('category-manage-modal').classList.remove('hidden');
      document.getElementById('new-category-input').value = '';
      renderCategoryList();
      setTimeout(() => document.getElementById('new-category-input').focus(), 50);
    }

    function closeCategoryManageModal() {
      document.getElementById('category-manage-modal').classList.add('hidden');
      editingCatIndex = -1;
    }

    function renderCategoryList() {
      const ul = document.getElementById('category-list');
      if (categories.length === 0) {
        ul.innerHTML = '<li class="text-center text-gray-400 text-sm py-4">カテゴリがありません</li>';
        return;
      }
      const allItems = [...toBuyItems, ...purchasedItems];
      ul.innerHTML = categories.map((cat, i) => {
        const useCount = allItems.filter(item => item.category === cat).length;
        if (i === editingCatIndex) {
          return `
<li class="flex items-center gap-2 rounded-xl px-3 py-2 bg-amber-50">
  <input id="edit-cat-input" type="text" value="${esc(cat)}"
    class="flex-1 border border-amber-300 rounded-lg px-2.5 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
    onkeydown="if(event.key==='Enter') saveEditCategory(${i}); else if(event.key==='Escape') cancelEditCategory()"/>
  <button onclick="saveEditCategory(${i})"
    class="icon-btn text-amber-600 hover:bg-amber-100" title="保存">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
    </svg>
  </button>
  <button onclick="cancelEditCategory()"
    class="icon-btn text-gray-400 hover:bg-gray-100" title="キャンセル">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
    </svg>
  </button>
</li>`;
        }
        return `
<li class="flex items-center gap-2 rounded-xl px-3 py-2 hover:bg-gray-50 group">
  <span class="flex-1 text-sm text-gray-700">${esc(cat)}</span>
  ${useCount > 0 ? `<span class="text-xs text-gray-400">${useCount}件</span>` : ''}
  <button onclick="startEditCategory(${i})"
    class="icon-btn text-gray-300 hover:text-amber-500 hover:bg-amber-50 opacity-0 group-hover:opacity-100 transition-opacity" title="編集">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
    </svg>
  </button>
  <button onclick="deleteCategory(${i})"
    class="icon-btn text-gray-300 hover:text-red-400 hover:bg-red-50 opacity-0 group-hover:opacity-100 transition-opacity" title="削除">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
        d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
    </svg>
  </button>
</li>`;
      }).join('');

      if (editingCatIndex >= 0) {
        setTimeout(() => {
          const inp = document.getElementById('edit-cat-input');
          if (inp) { inp.focus(); inp.select(); }
        }, 30);
      }
    }

    function startEditCategory(i) { editingCatIndex = i; renderCategoryList(); }
    function cancelEditCategory() { editingCatIndex = -1; renderCategoryList(); }

    function saveEditCategory(i) {
      const inp     = document.getElementById('edit-cat-input');
      const newName = inp ? inp.value.trim() : '';
      if (!newName) { if (inp) inp.focus(); return; }
      if (newName === categories[i]) { cancelEditCategory(); return; }
      if (categories.includes(newName)) {
        alert(`「${newName}」はすでに存在します`);
        inp.focus();
        return;
      }
      const oldName = categories[i];
      categories[i] = newName;
      [...toBuyItems, ...purchasedItems].forEach(item => {
        if (item.category === oldName) item.category = newName;
      });
      saveData();
      editingCatIndex = -1;
      renderCategoryList();
      renderCategorySelect();
      renderToBuyList();
      renderPurchasedList();
    }

    function deleteCategory(i) {
      const name     = categories[i];
      const allItems = [...toBuyItems, ...purchasedItems];
      const useCount = allItems.filter(item => item.category === name).length;
      const msg = useCount > 0
        ? `「${name}」は${useCount}件で使用中です。\n削除すると先頭のカテゴリに変更されます。削除しますか？`
        : `「${name}」を削除しますか？`;
      if (!confirm(msg)) return;
      if (useCount > 0) {
        const fallback = categories.find((_, idx) => idx !== i) || '';
        allItems.forEach(item => { if (item.category === name) item.category = fallback; });
      }
      categories.splice(i, 1);
      editingCatIndex = -1;
      saveData();
      renderCategoryList();
      renderCategorySelect();
      renderToBuyList();
      renderPurchasedList();
    }

    function addCategory() {
      const inp  = document.getElementById('new-category-input');
      const name = inp.value.trim();
      if (!name) { inp.focus(); return; }
      if (categories.includes(name)) {
        alert(`「${name}」はすでに存在します`);
        inp.focus();
        return;
      }
      categories.push(name);
      saveData();
      renderCategoryList();
      renderCategorySelect();
      document.getElementById('input-category').value = name;
      inp.value = '';
      inp.focus();
    }

    // ─── Expose to global scope (inline onclick) ──────────────
    Object.assign(window, {
      toggleForm, addToBuyItem, toggleStorageMode,
      markPurchased, deleteToBuyItem,
      startEditField, cancelEditField, saveEditField, toggleExpirySelectsInCell, deletePurchasedItem,
      openCategoryManageModal, closeCategoryManageModal,
      startEditCategory, cancelEditCategory, saveEditCategory, deleteCategory, addCategory,
    });

    // ─── Init ────────────────────────────────────────────────
    loadLocal();
    renderCategorySelect();
    renderToBuyList();
    renderPurchasedList();
    updateModeUI();
    if (storageMode === 'firebase') enableFirebaseListener();
  </script>

</body>
</html>
