<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>食料品チェッカー</title>
  <link rel="apple-touch-icon" href="logo.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="食料品チェッカー">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }

    #form-content {
      transition: max-height 0.35s ease, opacity 0.3s ease;
      overflow: hidden;
    }
    #form-chevron {
      transition: transform 0.3s ease;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      background: transparent;
      cursor: pointer;
      transition: background-color 0.15s;
    }

    @keyframes pulse-warn {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.5; }
    }
    .expiry-pulse { animation: pulse-warn 2s ease-in-out infinite; }

    .item-row { transition: background-color 0.15s; }
    .item-row:hover { background-color: rgba(255, 251, 235, 0.8); }

    .delete-btn { opacity: 0; transition: opacity 0.2s; }
    .item-row:hover .delete-btn { opacity: 1; }

    #mode-thumb  { transition: transform 0.2s ease; }
    #mode-toggle { transition: background-color 0.2s ease; }

    /* iOSの自動ズームを防ぐ */
    input, select, textarea { font-size: 16px !important; }

    @media (max-width: 640px) {
      .delete-btn { opacity: 1; }
    }
  </style>
</head>
<body class="min-h-screen" style="background: linear-gradient(135deg,#fffbeb 0%,#fff7ed 50%,#fef3c7 100%)">

  <!-- ── Header ──────────────────────────────────────────── -->
  <header class="bg-white/80 backdrop-blur-sm border-b border-amber-100 sticky top-0 z-30 shadow-sm">
    <div class="max-w-5xl mx-auto px-4 py-3 flex items-center gap-3">
      <span class="text-2xl">🛒</span>
      <div>
        <h1 class="text-lg font-bold text-amber-700 leading-tight">食料品チェッカー</h1>
        <p class="text-xs text-amber-400">新鮮な食材を管理しましょう</p>
      </div>
      <div class="ml-auto flex items-center gap-2">
        <span class="text-xs text-gray-400">ローカル</span>
        <button id="mode-toggle" onclick="toggleStorageMode()" title="保存先を切り替え"
          class="relative w-10 h-5 rounded-full focus:outline-none"
          style="background:#d1d5db">
          <span id="mode-thumb"
            class="absolute top-0.5 left-0.5 w-4 h-4 bg-white rounded-full shadow"
            style="transform:translateX(0)"></span>
        </button>
        <span class="text-xs text-gray-400">Firebase</span>
      </div>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-4 py-5 space-y-5">

    <!-- ── 上段：登録フォーム（折りたたみ） ──────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-amber-100/60">

      <button id="form-toggle"
        class="w-full flex items-center justify-between px-5 py-4 text-left hover:bg-amber-50/50 transition-colors rounded-2xl"
        onclick="toggleForm()">
        <div class="flex items-center gap-2 text-amber-700 font-semibold">
          <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/>
          </svg>
          買うものを登録
        </div>
        <svg id="form-chevron" class="w-5 h-5 text-amber-400"
          style="transform:rotate(180deg)"
          fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
        </svg>
      </button>

      <div id="form-content" style="max-height:600px;opacity:1;">
        <div class="px-5 pb-5">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-4">

            <!-- 品名 -->
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1.5">品名</label>
              <input id="input-name" type="text" placeholder="例：牛乳"
                class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent placeholder-gray-300"
                onkeydown="if(event.key==='Enter') addToBuyItem()"/>
            </div>

            <!-- カテゴリ -->
            <div>
              <label class="block text-xs font-medium text-gray-500 mb-1.5">カテゴリ</label>
              <div class="flex gap-2">
                <select id="input-category"
                  class="flex-1 border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-amber-400 focus:border-transparent">
                </select>
                <button onclick="openCategoryManageModal()"
                  title="カテゴリを管理"
                  class="px-2.5 py-2 bg-amber-50 hover:bg-amber-100 text-amber-600 rounded-xl border border-amber-200 transition-colors flex items-center justify-center">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>

          <button onclick="addToBuyItem()"
            class="w-full sm:w-auto px-8 py-2.5 bg-amber-500 hover:bg-amber-600 active:bg-amber-700 text-white rounded-xl font-semibold text-sm shadow-sm transition-colors">
            追加する
          </button>
        </div>
      </div>
    </section>

    <!-- ── 中段：買うものリスト ────────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-amber-100/60">

      <div class="px-5 py-4 border-b border-gray-100 flex items-center gap-3">
        <span class="text-xl">🛍️</span>
        <h2 class="font-semibold text-gray-700">
          買うものリスト
        </h2>
        <span id="tobuy-count" class="text-sm font-normal text-gray-400"></span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">品名</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">カテゴリ</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">操作</th>
            </tr>
          </thead>
          <tbody id="tobuy-list"></tbody>
        </table>

        <div id="tobuy-empty" class="py-14 text-center">
          <div class="text-5xl mb-3">✅</div>
          <p class="text-gray-400 font-medium">買うものはありません</p>
          <p class="text-gray-300 text-xs mt-1">上のフォームから追加してください</p>
        </div>
      </div>
    </section>

    <!-- ── 下段：買ったものリスト ─────────────────────────── -->
    <section class="bg-white rounded-2xl shadow-sm border border-orange-100/60">

      <div class="px-5 py-4 border-b border-gray-100 flex items-center gap-3">
        <span class="text-xl">🥦</span>
        <h2 class="font-semibold text-gray-700">
          買ったものリスト
        </h2>
        <span id="purchased-count" class="text-sm font-normal text-gray-400"></span>
      </div>

      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-gray-100">
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">品名</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">カテゴリ</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">購入日</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">賞味期限</th>
              <th class="px-5 py-3 text-left text-xs font-semibold text-gray-400 uppercase tracking-wide whitespace-nowrap">操作</th>
            </tr>
          </thead>
          <tbody id="purchased-list"></tbody>
        </table>

        <div id="purchased-empty" class="py-14 text-center">
          <div class="text-5xl mb-3">🛒</div>
          <p class="text-gray-400 font-medium">まだ購入済みのものはありません</p>
          <p class="text-gray-300 text-xs mt-1">買うものリストから「購入済へ」を押してください</p>
        </div>
      </div>
    </section>
  </main>

  <!-- ── カテゴリ管理モーダル ─────────────────────────────── -->
  <div id="category-manage-modal"
    class="fixed inset-0 flex items-center justify-center z-50 hidden"
    style="background:rgba(0,0,0,0.25);backdrop-filter:blur(4px)"
    onclick="if(event.target===this) closeCategoryManageModal()">
    <div class="bg-white rounded-2xl shadow-2xl w-96 mx-4 flex flex-col" style="max-height:85vh">

      <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
        <h3 class="font-semibold text-gray-700">カテゴリ管理</h3>
        <button onclick="closeCategoryManageModal()"
          class="icon-btn text-gray-400 hover:text-gray-600 hover:bg-gray-100">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <ul id="category-list" class="overflow-y-auto flex-1 px-4 py-3 space-y-1"></ul>

      <div class="px-4 py-4 border-t border-gray-100">
        <p class="text-xs font-medium text-gray-400 mb-2">新しいカテゴリを追加</p>
        <div class="flex gap-2">
          <input id="new-category-input" type="text" placeholder="例：冷凍食品"
            class="flex-1 border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400"
            onkeydown="if(event.key==='Enter') addCategory()"/>
          <button onclick="addCategory()"
            class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white rounded-xl text-sm font-semibold transition-colors whitespace-nowrap">
            追加
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── JavaScript ─────────────────────────────────────── -->
  <script>
    // ─── State ───────────────────────────────────────────────
    let toBuyItems     = [];
    let purchasedItems = [];
    let categories     = ['野菜', '肉・魚', '乳製品', '飲み物', '調味料', 'その他'];
    let formCollapsed  = false;

    const TOBUY_KEY     = 'grocery-checker-tobuy';
    const PURCHASED_KEY = 'grocery-checker-purchased';
    const CATS_KEY      = 'grocery-checker-categories';
    const MODE_KEY      = 'grocery-checker-mode';
    let storageMode     = localStorage.getItem(MODE_KEY) || 'local';

    // ─── Persistence ─────────────────────────────────────────
    function loadLocal() {
      try {
        const st = localStorage.getItem(TOBUY_KEY);
        const sp = localStorage.getItem(PURCHASED_KEY);
        const sc = localStorage.getItem(CATS_KEY);
        if (st) toBuyItems     = JSON.parse(st);
        if (sp) purchasedItems = JSON.parse(sp);
        if (sc) categories     = JSON.parse(sc);
      } catch(e) {}
    }

    function saveLocal() {
      localStorage.setItem(TOBUY_KEY,     JSON.stringify(toBuyItems));
      localStorage.setItem(PURCHASED_KEY, JSON.stringify(purchasedItems));
      localStorage.setItem(CATS_KEY,      JSON.stringify(categories));
    }

    function saveData() {
      saveLocal();
      // Firebase同期は Stage 4 で追加
    }

    // ─── Helpers ─────────────────────────────────────────────
    function todayStr() {
      return new Date().toISOString().split('T')[0];
    }

    function pad(n) { return String(n).padStart(2, '0'); }

    function formatDate(str) {
      if (!str) return '—';
      const [y, m, d] = str.split('-');
      return `${y}/${m}/${d}`;
    }

    function esc(s) {
      return String(s)
        .replace(/&/g,  '&amp;')
        .replace(/</g,  '&lt;')
        .replace(/>/g,  '&gt;')
        .replace(/"/g,  '&quot;')
        .replace(/'/g,  '&#39;');
    }

    // ─── Storage mode UI ─────────────────────────────────────
    function updateModeUI() {
      const toggle = document.getElementById('mode-toggle');
      const thumb  = document.getElementById('mode-thumb');
      if (storageMode === 'firebase') {
        toggle.style.background = '#d97706';
        thumb.style.transform   = 'translateX(20px)';
      } else {
        toggle.style.background = '#d1d5db';
        thumb.style.transform   = 'translateX(0)';
      }
    }

    function toggleStorageMode() {
      alert('Firebase連携は Stage 4 で実装予定です');
    }

    // ─── Form ────────────────────────────────────────────────
    function toggleForm() {
      formCollapsed = !formCollapsed;
      const content = document.getElementById('form-content');
      const chevron = document.getElementById('form-chevron');
      if (formCollapsed) {
        content.style.maxHeight = '0';
        content.style.opacity   = '0';
        chevron.style.transform = 'rotate(0deg)';
      } else {
        content.style.maxHeight = '600px';
        content.style.opacity   = '1';
        chevron.style.transform = 'rotate(180deg)';
      }
    }

    function addToBuyItem() {
      const name     = document.getElementById('input-name').value.trim();
      const category = document.getElementById('input-category').value;

      if (!name) {
        const inp = document.getElementById('input-name');
        inp.classList.add('ring-2', 'ring-red-400');
        inp.focus();
        setTimeout(() => inp.classList.remove('ring-2', 'ring-red-400'), 1500);
        return;
      }

      toBuyItems.push({ id: Date.now().toString(), name, category });
      saveData();
      renderToBuyList();
      document.getElementById('input-name').value = '';
      document.getElementById('input-name').focus();
    }

    // ─── To-Buy actions ──────────────────────────────────────
    function markPurchased(id) {
      const item = toBuyItems.find(i => i.id === id);
      if (!item) return;
      toBuyItems = toBuyItems.filter(i => i.id !== id);
      purchasedItems.unshift({
        id:            Date.now().toString(),
        name:          item.name,
        category:      item.category,
        purchasedDate: todayStr(),
        expiryDate:    null,
      });
      saveData();
      renderToBuyList();
      renderPurchasedList();
    }

    function deleteToBuyItem(id) {
      if (!confirm('このアイテムを削除しますか？')) return;
      toBuyItems = toBuyItems.filter(i => i.id !== id);
      saveData();
      renderToBuyList();
    }

    // ─── Render: category select ─────────────────────────────
    function renderCategorySelect() {
      const sel  = document.getElementById('input-category');
      const prev = sel.value;
      sel.innerHTML = categories
        .map(c => `<option value="${esc(c)}">${esc(c)}</option>`)
        .join('');
      if (categories.includes(prev)) sel.value = prev;
    }

    // ─── Render: to-buy list ─────────────────────────────────
    function renderToBuyList() {
      const tbody = document.getElementById('tobuy-list');
      const empty = document.getElementById('tobuy-empty');
      document.getElementById('tobuy-count').textContent =
        toBuyItems.length ? `(${toBuyItems.length}件)` : '';

      if (toBuyItems.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      tbody.innerHTML = toBuyItems.map(item => `
<tr class="item-row border-b border-gray-50">
  <td class="px-5 py-3.5 font-medium text-gray-700 whitespace-nowrap">${esc(item.name)}</td>
  <td class="px-5 py-3.5 whitespace-nowrap">
    <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-amber-50 text-amber-700 border border-amber-100">
      ${esc(item.category)}
    </span>
  </td>
  <td class="px-5 py-3.5 whitespace-nowrap">
    <div class="flex items-center gap-1">
      <button
        class="flex items-center gap-1.5 px-3 py-1.5 bg-green-50 hover:bg-green-100 text-green-700 rounded-lg text-xs font-medium border border-green-200 transition-colors"
        onclick="markPurchased('${esc(item.id)}')" title="購入済みにする">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
        </svg>
        購入済へ
      </button>
      <button class="icon-btn delete-btn text-gray-300 hover:text-red-400 hover:bg-red-50"
        onclick="deleteToBuyItem('${esc(item.id)}')" title="削除">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </td>
</tr>`).join('');
    }

    // ─── Expiry helpers ──────────────────────────────────────
    function expiryStatus(expiryStr) {
      if (!expiryStr) return 'none';
      const now    = new Date(); now.setHours(0, 0, 0, 0);
      const expiry = new Date(expiryStr + 'T00:00:00');
      const diff   = Math.ceil((expiry - now) / 86400000);
      if (diff < 0)  return 'expired';
      if (diff <= 3) return 'soon';
      return 'ok';
    }

    function expiryDiff(expiryStr) {
      const now    = new Date(); now.setHours(0, 0, 0, 0);
      const expiry = new Date(expiryStr + 'T00:00:00');
      return Math.ceil((expiry - now) / 86400000);
    }

    // ─── Expiry edit state ───────────────────────────────────
    let editingExpiryId = null;

    function startEditExpiry(id) {
      editingExpiryId = id;
      renderPurchasedList();
      setTimeout(() => {
        const el = document.getElementById('edit-expiry-year');
        if (el) el.focus();
      }, 30);
    }

    function cancelEditExpiry() {
      editingExpiryId = null;
      renderPurchasedList();
    }

    function saveEditExpiry(id) {
      const y    = document.getElementById('edit-expiry-year').value;
      const m    = document.getElementById('edit-expiry-month').value;
      const d    = document.getElementById('edit-expiry-day').value;
      const item = purchasedItems.find(i => i.id === id);
      if (item) {
        item.expiryDate = `${y}-${pad(m)}-${pad(d)}`;
        saveData();
      }
      editingExpiryId = null;
      renderPurchasedList();
    }

    function clearExpiry(id) {
      const item = purchasedItems.find(i => i.id === id);
      if (item) { item.expiryDate = null; saveData(); }
      editingExpiryId = null;
      renderPurchasedList();
    }

    // ─── Render: purchased list ──────────────────────────────
    function renderPurchasedList() {
      const tbody = document.getElementById('purchased-list');
      const empty = document.getElementById('purchased-empty');
      document.getElementById('purchased-count').textContent =
        purchasedItems.length ? `(${purchasedItems.length}件)` : '';

      if (purchasedItems.length === 0) {
        tbody.innerHTML = '';
        empty.classList.remove('hidden');
        return;
      }
      empty.classList.add('hidden');

      const now      = new Date(); now.setHours(0, 0, 0, 0);
      const thisYear = now.getFullYear();
      const years    = Array.from({ length: 6 }, (_, i) => thisYear + i);
      const months   = Array.from({ length: 12 }, (_, i) => i + 1);
      const days     = Array.from({ length: 31 }, (_, i) => i + 1);

      tbody.innerHTML = purchasedItems.map(item => {
        const status    = expiryStatus(item.expiryDate);
        const isEditing = item.id === editingExpiryId;

        // 賞味期限セル
        let expiryCell;
        if (isEditing) {
          let ey = thisYear, em = now.getMonth() + 1, ed = now.getDate();
          if (item.expiryDate) {
            const parts = item.expiryDate.split('-');
            ey = parseInt(parts[0]);
            em = parseInt(parts[1]);
            ed = parseInt(parts[2]);
          }
          expiryCell = `
<td class="px-5 py-2" style="min-width:280px">
  <div class="flex items-center gap-1 flex-wrap">
    <select id="edit-expiry-year"
      class="border border-amber-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
      ${years.map(y => `<option value="${y}"${y === ey ? ' selected' : ''}>${y}年</option>`).join('')}
    </select>
    <select id="edit-expiry-month"
      class="border border-amber-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
      ${months.map(m => `<option value="${m}"${m === em ? ' selected' : ''}>${m}月</option>`).join('')}
    </select>
    <select id="edit-expiry-day"
      class="border border-amber-300 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-amber-400 bg-white">
      ${days.map(d => `<option value="${d}"${d === ed ? ' selected' : ''}>${d}日</option>`).join('')}
    </select>
    <button onclick="saveEditExpiry('${esc(item.id)}')"
      class="icon-btn text-amber-500 hover:bg-amber-50" title="保存">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"/>
      </svg>
    </button>
    <button onclick="cancelEditExpiry()"
      class="icon-btn text-gray-300 hover:bg-gray-100" title="キャンセル">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
      </svg>
    </button>
    ${item.expiryDate
      ? `<button onclick="clearExpiry('${esc(item.id)}')"
           class="text-xs text-gray-400 hover:text-red-400 px-2 py-1 rounded-lg hover:bg-red-50 transition-colors">
           クリア
         </button>`
      : ''}
  </div>
</td>`;
        } else {
          let label = '—';
          let cls   = 'text-gray-400';
          let pulse = '';
          if (item.expiryDate) {
            const diff = expiryDiff(item.expiryDate);
            label = formatDate(item.expiryDate);
            if (status === 'expired') {
              cls   = 'text-red-500 font-semibold';
              pulse = 'expiry-pulse';
              label += ` (${Math.abs(diff)}日超過)`;
            } else if (status === 'soon') {
              cls   = 'text-orange-500 font-semibold';
              label += diff === 0 ? ' (今日まで)' : ` (あと${diff}日)`;
            }
          }
          expiryCell = `
<td class="px-5 py-3.5 whitespace-nowrap">
  <span class="${cls} ${pulse} text-sm">${label}</span>
</td>`;
        }

        const rowBg = status === 'expired' ? 'bg-red-50/40'
                    : status === 'soon'    ? 'bg-orange-50/40'
                    : '';

        return `
<tr class="item-row border-b border-gray-50 ${rowBg}">
  <td class="px-5 py-3.5 font-medium text-gray-700 whitespace-nowrap">${esc(item.name)}</td>
  <td class="px-5 py-3.5 whitespace-nowrap">
    <span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium bg-orange-50 text-orange-700 border border-orange-100">
      ${esc(item.category)}
    </span>
  </td>
  <td class="px-5 py-3.5 text-gray-500 whitespace-nowrap">${formatDate(item.purchasedDate)}</td>
  ${expiryCell}
  <td class="px-5 py-3.5 whitespace-nowrap">
    <div class="flex items-center gap-1">
      ${!isEditing ? `
      <button class="icon-btn text-gray-400 hover:text-amber-500 hover:bg-amber-50"
        onclick="startEditExpiry('${esc(item.id)}')" title="賞味期限を設定">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"/>
        </svg>
      </button>` : ''}
      <button class="icon-btn delete-btn text-gray-300 hover:text-red-400 hover:bg-red-50"
        onclick="deletePurchasedItem('${esc(item.id)}')" title="削除">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>
  </td>
</tr>`;
      }).join('');
    }

    function deletePurchasedItem(id) {
      if (!confirm('このアイテムを削除しますか？')) return;
      purchasedItems = purchasedItems.filter(i => i.id !== id);
      saveData();
      renderPurchasedList();
    }

    // ─── Category modal (placeholder) ────────────────────────
    function openCategoryManageModal() {
      document.getElementById('category-manage-modal').classList.remove('hidden');
      renderCategoryList();
      setTimeout(() => document.getElementById('new-category-input').focus(), 50);
    }

    function closeCategoryManageModal() {
      document.getElementById('category-manage-modal').classList.add('hidden');
    }

    function renderCategoryList() {
      // Stage 4 で本実装（暫定：リスト表示のみ）
      const ul = document.getElementById('category-list');
      ul.innerHTML = categories.map((cat, i) => `
<li class="flex items-center gap-2 rounded-xl px-3 py-2 hover:bg-gray-50">
  <span class="flex-1 text-sm text-gray-700">${esc(cat)}</span>
</li>`).join('');
    }

    function addCategory() {
      const inp  = document.getElementById('new-category-input');
      const name = inp.value.trim();
      if (!name) { inp.focus(); return; }
      if (categories.includes(name)) {
        alert(`「${name}」はすでに存在します`);
        inp.focus();
        return;
      }
      categories.push(name);
      saveData();
      renderCategoryList();
      renderCategorySelect();
      document.getElementById('input-category').value = name;
      inp.value = '';
      inp.focus();
    }

    // ─── Init ────────────────────────────────────────────────
    loadLocal();
    renderCategorySelect();
    renderToBuyList();
    renderPurchasedList();
    updateModeUI();
  </script>

</body>
</html>
